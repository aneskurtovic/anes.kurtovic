name = "portfolio-agents"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Cloudflare Rate Limiting binding — per-IP throttle enforced at the edge,
# per Cloudflare location (eventually consistent). limit/period: 15 req / 60s.
# period must be 10 or 60. namespace_id is any integer unique to the account.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 15, period = 60 }
