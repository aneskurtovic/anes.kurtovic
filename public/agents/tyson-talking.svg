<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Tyson-inspired talking avatar</title>
  <desc id="desc">Flat vector caricature avatar inspired by a fierce bald boxing legend. Neutral and talking variants share the same framing and pose; only the mouth changes.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#3a1512" stop-opacity="0.95"/>
      <stop offset="43%" stop-color="#131722" stop-opacity="1"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5537"/>
      <stop offset="55%" stop-color="#6e3d29"/>
      <stop offset="100%" stop-color="#512719"/>
    </linearGradient>
    <linearGradient id="skinSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f3b27"/>
      <stop offset="100%" stop-color="#472014"/>
    </linearGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c303a"/>
      <stop offset="100%" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d26d"/>
      <stop offset="100%" stop-color="#b77924"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>


