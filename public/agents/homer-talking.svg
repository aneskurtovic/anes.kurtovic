<svg viewBox="0 0 256 256" width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded background -->
  <rect width="256" height="256" rx="24" fill="#12121a"/>

  <!-- Head (tall rounded, yellow) -->
  <ellipse cx="128" cy="130" rx="72" ry="88" fill="#ffd90f"/>

  <!-- Crown hair strokes (M-like, thin black curves) -->
  <path d="M 105 50 Q 102 32 98 18" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 128 45 Q 125 22 120 8" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 151 50 Q 154 32 158 18" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ear curls (thin black curves) -->
  <path d="M 58 115 Q 45 105 50 135" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 198 115 Q 211 105 206 135" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes (large overlapping white circles with black pupils) -->
  <circle cx="104" cy="108" r="19" fill="white"/>
  <circle cx="152" cy="108" r="19" fill="white"/>
  <circle cx="104" cy="108" r="11" fill="black"/>
  <circle cx="152" cy="108" r="11" fill="black"/>

  <!-- Nose (large rounded, with dark outline) -->
  <ellipse cx="128" cy="145" rx="17" ry="22" fill="#ffd90f" stroke="black" stroke-width="2.5"/>

  <!-- Stubble dots around lower face/jaw (grey-blue small circles) -->
  <circle cx="82" cy="165" r="3.5" fill="#8a8a8a"/>
  <circle cx="98" cy="180" r="3.5" fill="#8a8a8a"/>
  <circle cx="125" cy="192" r="3.5" fill="#8a8a8a"/>
  <circle cx="158" cy="180" r="3.5" fill="#8a8a8a"/>
  <circle cx="174" cy="165" r="3.5" fill="#8a8a8a"/>
  <circle cx="92" cy="175" r="2.5" fill="#8a8a8a"/>
  <circle cx="164" cy="175" r="2.5" fill="#8a8a8a"/>
  <circle cx="110" cy="188" r="2.5" fill="#8a8a8a"/>
  <circle cx="146" cy="188" r="2.5" fill="#8a8a8a"/>

  <!-- Chin (small rounded) -->
  <ellipse cx="128" cy="208" rx="13" ry="9" fill="#ffd90f"/>

  <!-- Talking mouth (open oval) -->
  <ellipse cx="128" cy="176" rx="15" ry="20" fill="#8a5a3a"/>
</svg>